version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: stockhub_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    image: shivanandpotle/stockhub-backend:latest
    container_name: stockhub_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://StockHub:Mayuresh%40123@cluster0.mom2fmj.mongodb.net/stockhub?appName=Cluster0
      - JWT_SECRET=super_secret_stockhub_jwt_key_2026
      - CLIENT_URL=http://localhost
      - GEMINI_API_KEY=your_gemini_api_key_here
      - SENDGRID_API_KEY=your_sendgrid_api_key_here
      - EMAIL_FROM=sunitabadbade722@gmail.com
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    image: shivanandpotle/stockhub-frontend:latest
    container_name: stockhub_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
